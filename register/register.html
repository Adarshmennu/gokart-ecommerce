<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gokart Register</title>
    <link rel="stylesheet" href="./register.css">
</head>
<body>
    <form action="" id="formcontainer">
         <h1>Create Account  </h1>
         <p class="subtitle">Join GoKart and start Shoping🛒</p>
        <div class="group">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="Enter Your name" required>
        </div>
        <div class="group">
            <label for="email">Email</label>
            <input type="text" id="email" placeholder="Entur Your Email" required>
        </div>
        <div class="group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <div class="group">
            <label for="PhNo">PhNo</label>
            <input type="text" id="PhNo" placeholder="+91 1234567890" required>
        </div>

        <button type="submit" id="sub-btn">Register</button>

        <p class="link">
        Already have an account?
        <a href="login.html">Login</a>
        </p>

         
    </form>
    


    <script src="./register.js"></script>
</body>
</html>
